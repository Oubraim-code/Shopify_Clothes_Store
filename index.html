<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Clothes</title>
  </head>
  <body>
    <div class="announcment"></div>
    <header>
      <a href="#" class="logo">
        <img src="imgs/tentreelogo.svg" alt="Logo" />
      </a>
      <ul class="links">
        <li><a href="#">WOMENS</a></li>
        <li><a href="#">MENS</a></li>
        <li><a href="#">ACCESSORIES</a></li>
        <li><a href="#">CLIMATE</a></li>
        <li><a href="#">IMPACT</a></li>
      </ul>
      <div class="links-others">
        <span class="profile">
          <img class="icons" src="imgs/icons8-profile-24.png" alt="" />
        </span>
        <button class="search">
          <img class="icons" src="imgs/icons8-search-24.png" alt="" />
        </button>
        <span class="cart">
          <img class="icons" src="imgs/icons8-cart-24.png" alt="" />
        </span>
      </div>
    </header>
    <section class="hero-container">
      <video
        autoplay
        muted
        loop
        playsinline
        poster="fallback-image.jpg"
        class="bg-video"
      >
        <source src="imgs/vid_shopify.mp4" type="video/mp4" />
      </video>

      <div class="overlay"></div>

      <div class="content">
        <span>Inspired by the Wild</span>
        <h1>New Spring Styles</h1>
        <p>
          Our new Spring Collection is inspired by our deep connection to nature
          and the landscapes we <br />
          work to protect.
        </p>
        <div class="hero-btns">
          <button>SHOP WOMENS</button>
          <button>SHOP MENS</button>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
